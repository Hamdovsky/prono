services:
  - type: web
    name: prono
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: FOOTBALLDATA_ENABLED
        value: "true"
      - key: FOOTBALLDATA_KEY
        sync: false
      - key: FOOTBALLDATA_HOST
        value: footballdata.io
      - key: FOOTBALLDATA_DAILY_LIMIT
        value: "20"
      - key: RAPIDAPI_ENABLED
        value: "true"
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: sportapi7.p.rapidapi.com
      - key: RAPIDAPI_DAILY_LIMIT
        value: "20"
      - key: VITE_API_URL
        value: https://prono-l5e3.onrender.com
